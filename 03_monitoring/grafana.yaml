# =============================================================
# RHOAI Demo - Grafana (手冊 4-3 ~ 4-5, Appendix A2)
# 由 setup-monitoring.sh 套用; datasource/dashboard ConfigMap
# 由腳本動態產生 (需要 SA token 與 thanos-querier route)
# =============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: utilities
---
# 手冊 4-4: Grafana Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: utilities
---
# 手冊 4-5: SA Token (長效)
apiVersion: v1
kind: Secret
metadata:
  name: grafana-sa-token
  namespace: utilities
  annotations:
    kubernetes.io/service-account.name: "grafana"
type: kubernetes.io/service-account-token
---
# 手冊 4-4: 讀取叢集監控資料的權限
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-cluster-monitoring-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: utilities
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana
  namespace: utilities
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: grafana
  name: grafana
  namespace: utilities
spec:
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      serviceAccountName: grafana
      containers:
        - name: grafana
          image: grafana/grafana:12.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http-grafana
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /robots.txt
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 3000
            timeoutSeconds: 1
          resources:
            requests:
              cpu: 250m
              memory: 750Mi
          volumeMounts:
            - mountPath: /var/lib/grafana
              name: grafana
            # 手冊 4-6: datasource 自動佈建 (取代 GUI 設定)
            - mountPath: /etc/grafana/provisioning/datasources
              name: grafana-datasources
            # 手冊 4-7: dashboard 自動佈建 (取代 GUI 匯入)
            - mountPath: /etc/grafana/provisioning/dashboards
              name: grafana-dashboard-provider
            - mountPath: /var/lib/grafana/dashboards
              name: grafana-dashboards
      volumes:
        - name: grafana
          persistentVolumeClaim:
            claimName: grafana
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: utilities
spec:
  ports:
    - port: 3000
      protocol: TCP
      targetPort: 3000
  selector:
    app: grafana
---
kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: grafana
  namespace: utilities
spec:
  to:
    kind: Service
    name: grafana
    weight: 100
  port:
    targetPort: 3000
  tls:
    termination: edge
  wildcardPolicy: None
