# =============================================================
# RHOAI Demo - 手冊 11-1: Data Science Project + 儲存
# =============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    opendatahub.io/dashboard: 'true'   # 讓 RHOAI Dashboard 顯示為 Data Science Project
  annotations:
    openshift.io/display-name: demo
---
# Workbench 工作區 (手冊預設 20Gi)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen-workbench
  namespace: demo
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
# 模型存放 (掛到 Workbench 的 ~/models)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models
  namespace: demo
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 40Gi
